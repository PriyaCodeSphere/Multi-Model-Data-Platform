version: '3.8'

services:
  prism-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prism-multi-model-demo
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_CLIENT_LOGGER_LEVEL=info
      - STREAMLIT_LOGGER_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prism-network

volumes:
  data:
  logs:

networks:
  prism-network:
    driver: bridge
